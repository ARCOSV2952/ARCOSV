<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONVOCATORIA - Arcos V</title>
    <!-- Mantenemos tus fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; color: #1a1a1a; line-height: 1.6; padding: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        
        header { text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 10px; }
        .fecha { color: #8c2b32; margin-bottom: 30px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        
        /* Ajuste optimizado para tus fotos 1080x1350 */
        .img-container img { 
            width: 100%; 
            height: auto; 
            max-width: 100%;
            border-radius: 12px; 
            margin-bottom: 30px; 
            display: block; 
            object-fit: cover; 
        }
        
        h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 15px; }
        p { margin-bottom: 20px; color: #444; }
        
        /* Botón de WhatsApp */
        .btn-ws { 
            display: block; 
            text-align: center; 
            background-color: #25d366; 
            color: white; 
            padding: 18px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            margin-top: 30px;
            transition: 0.3s;
        }
        .btn-ws:hover { background-color: #1ebe57; transform: translateY(-2px); }
        
        .back { display: block; text-align: center; margin-top: 40px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <!-- REEMPLAZAR: Título del evento -->
            <h1>[NOMBRE DEL EVENTO]</h1>
            <!-- REEMPLAZAR: Fecha y Hora -->
            <p class="fecha">[DÍA] [FECHA] [HORA] HS.</p>
        </header>

        <main>
            <section class="img-container">
                <!-- REEMPLAZAR: Nombre de la imagen -->
                <img src="tu-imagen-aqui.webp" alt="Convocatoria Arcos V" width="1080" height="1350">
            </section>

            <section id="descripcion">
                <!-- REEMPLAZAR: Subtítulo atractivo -->
                <h2>[SUBTÍTULO DEL EVENTO]</h2>
                <p>[Descripción corta que invite a participar. Hablá de la experiencia y el lugar.]</p>
                <p>[Agregá un segundo párrafo con detalles específicos: qué incluye, para quién es, etc.]</p>
            </section>

            <!-- REEMPLAZAR: Link de WhatsApp con mensaje personalizado -->
            <a href="https://wa.me/5491162834000?text=Hola!%20Me%20quiero%20anotar%20en%20el%20evento:%20[NOMBRE]" class="btn-ws">
                Quiero sumarme al encuentro
            </a>
        </main>

        <footer>
            <a href="index.html#encuentros" class="back">← Volver a la agenda</a>
        </footer>
    </div>

</body>
</html>
