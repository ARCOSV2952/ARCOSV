<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcos V | Espacio para talleres, catas y encuentros en Núñez</title>

    <meta name="description" content="Arcos V es un espacio boutique con jardín en Núñez para talleres, catas, presentaciones de marcas, encuentros de comunidad y experiencias presenciales.">

    <link rel="icon" type="image/png" href="favicon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Arcos V | Espacio Boutique en Núñez">
    <meta property="og:description" content="Un refugio diseñado para experiencias exclusivas, catas de vino y encuentros curados en el corazón de Núñez.">
    <meta property="og:image" content="logo.png"> 
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://arcosv.com.ar">
    <meta property="og:site_name" content="Arcos V">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

   <style>
    /* --- BASE --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%;
        overflow-x: hidden;
        background-color: #ffffff; 
        scroll-behavior: smooth;
    }

    :root {
        --primary: #FFC107;  
        --bg: #f4f6f8;        
        --text: #021050;
        --text-light: #444444; 
        --radius: 16px;
        --shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    body {
        font-family: 'Inter', sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        padding-top: 100px; 
    }

    section {
        width: 100%;
        margin: 0;
        padding: 90px 0; 
    }

    .seccion-centrada {
        width: 100%;
        max-width: 1200px; 
        margin: 0 auto;
        padding: 0 25px; 
        box-sizing: border-box;
    }

    /* --- NAVBAR --- */
    header {
        position: fixed;
        top: 0; left: 0;
        background: #ffffff;
        z-index: 1000;
        width: 100%;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        height: 100px;
        display: flex;
        align-items: center;
    }
    .nav-container {
        width: 100%;
        max-width: 1400px; 
        margin: 0 auto;
        padding: 0 40px;   
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
    }
    .logo img { height: 65px; width: auto; filter: contrast(110%) multiply; mix-blend-mode: multiply; }
    .nav-links { display: flex; gap: 35px; }
    .nav-links a { text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500; transition: 0.3s; }
    .nav-links a:hover { opacity: 0.6; }

    /* --- HERO --- */
    .hero-container {
        position: relative;
        overflow: hidden;
        margin-top: -10px;
        padding: 0;
        height: 85vh;
        min-height: 520px;
        max-height: 720px;
    }
    .carousel-box {
        position: absolute;
        width: 100%; height: 100%;
        top: 0; left: 0; z-index: 1;
        background: #eee;
    }
    .split-slide {
        position: absolute;
        width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1.8s ease-in-out;
    }
    .split-slide.active { opacity: 1; }
    .hero-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 2;
    }
    .hero-content {
        position: absolute;
        bottom: 10%; left: 0;
        width: 100%; z-index: 3;
    }
    .hero-text {
        padding-left: 8%;
        max-width: 750px;
    }
    .hero-title { 
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700; 
        color: #ffffff; 
        text-shadow: 1px 1px 5px rgba(0,0,0,0.4); 
        font-size: 3.4rem; 
        line-height: 1.15;
    }
    .hero-title em {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
    }
    .hero-subtitle { 
        font-size: 18px; 
        color: #ffffff; 
        text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
        margin-top: 15px; 
        font-weight: 500;
        line-height: 1.4;
    }
    .hero-subtitle-secondary {
        font-size: 15px;
        color: rgba(255,255,255,0.85);
        margin-top: 10px;
        font-weight: 500;
        line-height: 1.5;
        max-width: 650px;
    }
    .hero-buttons {
        display: flex;
        gap: 15px;
        margin-top: 30px;
        padding-left: 8%;
    }
    .btn-hero-primary {
        background-color: var(--primary);
        color: #021050;
        padding: 14px 28px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        transition: 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-hero-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4); }
    .btn-hero-secondary {
        background-color: transparent;
        color: #ffffff;
        border: 2px solid #ffffff;
        padding: 12px 26px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        transition: 0.3s ease;
    }
    .btn-hero-secondary:hover { background-color: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }

    /* --- CARRUSEL CATEGORIAS HERO --- */
    .carrusel-texto-hero {
        overflow: hidden;
        white-space: nowrap;
        width: 100%;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(4px);
        padding: 10px 0;
        margin-top: 35px;
        display: flex;
        align-items: center;
    }
    .track-texto-hero {
        display: inline-block;
        animation: desplazarTextoHero 40s linear infinite;
    }
    .track-texto-hero span {
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        text-transform: uppercase;
        color: #ffffff;
        padding-right: 50px;
        display: inline-block;
        letter-spacing: 2px;
    }
    @keyframes desplazarTextoHero {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
    }

    /* --- FILTROS Y TARJETAS --- */
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--text); margin-bottom: 8px; }
    .section-tagline { color: var(--text-light); margin-bottom: 35px; font-style: italic; font-size: 16px; }
    
    .filters { display: flex; gap: 10px; margin-bottom: 35px; overflow-x: auto; white-space: nowrap; padding-bottom: 10px; }
    .filter-btn { padding: 10px 20px; border-radius: 30px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .filter-btn.active { background: var(--text); color: white; border-color: var(--text); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .card { text-decoration: none; color: inherit; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; position: relative; display: block; }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: auto; aspect-ratio: 4/5; object-fit: cover; display: block; }
    .card-content { padding: 22px; padding-bottom: 60px; }
    .card-tag { font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 1px; font-weight: 600; }
    .card-title { margin: 6px 0; font-family: 'Cormorant Garamond', serif; font-size: 20px; }
    .card-date { font-size: 13px; color: var(--text-light); }

    .btn-mira-mas {
        position: absolute; bottom: 20px; right: 20px;
        background-color: var(--primary); color: #021050;
        font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        padding: 8px 14px; border-radius: 8px; transition: all 0.3s ease;
    }
    .card:hover .btn-mira-mas { background-color: var(--text); color: #ffffff; }

    /* --- SECCION CONCEPTUAL --- */
    .tres-columnas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 40px; }
    .columna-concepto { background: #faf9f6; padding: 35px; border-radius: var(--radius); }
    .columna-concepto h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .columna-concepto ul { list-style: none; }
    .columna-concepto ul li { margin-bottom: 10px; color: var(--text-light); font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .columna-concepto ul li::before { content: "•"; color: var(--primary); font-weight: bold; }

    /* --- SECCION B2B + ESPACIO UNIFICADO --- */
    .b2b-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; margin-top: 30px; }
    .b2b-info-box { background: var(--text); color: white; padding: 45px; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: center; }
    .b2b-info-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 15px; color: white; }
    .b2b-info-box p { opacity: 0.85; line-height: 1.6; margin-bottom: 25px; font-size: 16px; }
    .btn-b2b { background: var(--primary); color: var(--text); text-decoration: none; font-weight: 600; padding: 15px 30px; border-radius: 30px; display: inline-block; align-self: flex-start; transition: 0.2s; }
    .btn-b2b:hover { opacity: 0.95; transform: translateY(-1px); }
    
    .espacio-detalles { display: flex; flex-direction: column; gap: 20px; }
    .foto-jardin { width: 100%; height: 260px; object-fit: cover; border-radius: var(--radius); box-shadow: var(--shadow); }
    
    /* --- LO QUE YA PASÓ --- */
    .pasado-banner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .pasado-stats { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--text-light); }
    .grid-pasado-fotos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .grid-pasado-fotos img { width: 100%; aspect-ratio: 1.1; object-fit: cover; border-radius: 12px; filter: grayscale(20%); opacity: 0.9; }

    /* --- NOVEDADES --- */
    .newsletter-box { background: #faf9f6; padding: 50px; border-radius: var(--radius); text-align: center; max-width: 700px; margin: 0 auto; }
    .newsletter-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 12px; }
    .newsletter-box p { color: var(--text-light); margin-bottom: 25px; }
    .form-group { display: flex; gap: 10px; max-width: 500px; margin: 0 auto; }
    .form-group input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #ddd; font-family: inherit; font-size: 14px; }
    .form-group button { background: var(--text); color: white; border: none; padding: 14px 25px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .form-group button:hover { opacity: 0.9; }

    /* --- FOOTER --- */
    footer { text-align: center; padding: 60px 20px; border-top: 1px solid #eee; background: #ffffff; width: 100%; margin-top: 40px; }
    footer p { color: var(--text-light); font-size: 14px; }
    .footer-links { margin-top: 15px; }
    .footer-links a { color: var(--text); text-decoration: none; font-weight: 600; padding: 10px; }

    /* --- RESPONSIVE --- */
    @media (max-width: 700px) {
        header { height: 75px; }
        body { padding-top: 75px; }
        .logo img { height: 50px; }
        .nav-links { display: none; }
        section { padding: 50px 0; }
        
        .hero-title { font-size: 2.1rem; }
        .hero-subtitle { font-size: 15px; }
        .hero-buttons { flex-direction: column; gap: 10px; padding-right: 8%; }
        .btn-hero-primary, .btn-hero-secondary { width: 100%; text-align: center; justify-content: center; }
        
        .tres-columnas, .b2b-layout { grid-template-columns: 1fr; gap: 20px; }
        .grid-pasado-fotos { grid-template-columns: repeat(2, 1fr); }
        .form-group { flex-direction: column; }
        .form-group button { width: 100%; }
    }
</style>
</head>

<body>

   <header>
    <div class="nav-container">
        <div class="logo">
            <a href="#inicio"><img src="logo.png" alt="Arcos V Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="#encuentros">Encuentros</a>
            <a href="#que-es">Qué es</a>
            <a href="#organizar">Organizá</a>
            <a href="#faq">Preguntas</a>
            <a href="#novedades">Novedades</a>
        </nav>
        <button class="menu-toggle" aria-label="Abrir menú" onclick="toggleMenu()">☰</button>
    </div>
</header>

    <div class="hero-container" id="inicio">
        <div class="carousel-box">
            <img class="split-slide active" src="hero-1.webp" fetchpriority="high" alt="Espacio boutique Arcos V">
            <img class="split-slide" src="hero-2.webp" loading="lazy" alt="Encuentro corporativo">
            <img class="split-slide" src="hero-3.webp" loading="lazy" alt="Sala taller Arcos V">
            <img class="split-slide" src="hero-4.webp" loading="lazy" alt="Jardín Arcos V">
