<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiencia sensorial - Arcos V</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-top: 15px;
    }

    .meta { color: #666; margin-top: 5px; }
    .price { font-size: 20px; font-weight: bold; margin-top: 10px; }
    .urgency { color: #b00020; margin-top: 5px; }

    .desc {
      margin-top: 15px;
      line-height: 1.6;
      color: #444;
    }

    .btn {
      display: block;
      margin-top: 25px;
      padding: 16px;
      background: black;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .back {
      display: block;
      margin-bottom: 15px;
      color: #666;
      text-decoration: none;
    }

    /* CARRUSEL SIMPLE Y ROBUSTO */

    .carousel img {
      width: 100%;
      border-radius: 12px;
      display: none;
    }

    .carousel img.active {
      display: block;
    }

  </style>
</head>

<body>

<div class="container">

  <a class="back" href="index.html">← Volver</a>

  <!-- CARRUSEL -->
  <div class="carousel">
    <img src="Prueba3.jpg" class="active">
    <img src="Prueba3b.jpg">
    <img src="Prueba3c.jpg">
  </div>

  <h1>Experiencia sensorial</h1>

  <div class="meta">30 de abril · 20 hs</div>
  <div class="price">$20.000</div>
  <div class="urgency">Quedan pocos lugares</div>

  <div class="desc">
    Un recorrido por aromas, texturas y sensaciones.
    Una experiencia distinta, diseñada para activar los sentidos en un entorno cuidado.
  </div>

  <a class="btn" href="https://wa.me/5491112345678?text=Hola%20quiero%20reservar%20la%20experiencia%20sensorial">
    Reservar por WhatsApp
  </a>

</div>

<script>
let current = 0;
const slides = document.querySelectorAll('.carousel img');

function showSlide(i) {
  slides.forEach(img => img.classList.remove('active'));
  slides[i].classList.add('active');
}

setInterval(() => {
  current = (current + 1) % slides.length;
  showSlide(current);
}, 3000);
</script>

</body>
</html>
